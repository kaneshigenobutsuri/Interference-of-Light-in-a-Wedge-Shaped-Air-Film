<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>くさび型空気層における光の干渉実験</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f7f9; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .main-container { position: relative; width: 900px; height: 500px; background: #fff; border: 2px solid #333; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); overflow: hidden; }
        #mainCanvas { display: block; width: 900px; height: 500px; }
        #topCanvas { display: block; width: 900px; height: 80px; border-radius: 8px; border: 2px solid #222; margin-top: 15px; background: #000; }
        
        /* 情報パネル */
        .bubble { position: absolute; top: 15px; left: 15px; width: 260px; height: 110px; background: rgba(255,255,255,0.96); border: 2px solid #444; border-radius: 12px; z-index: 10; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .bubble-label { font-size: 11px; font-weight: bold; color: #666; text-align: center; margin-bottom: 2px; }
        #phaseStatus { font-size: 13px; font-weight: bold; text-align: center; margin-top: 4px; padding: 4px; border-radius: 6px; }

        .legend { position: absolute; top: 15px; right: 15px; width: 180px; background: rgba(255,255,255,0.96); border: 2px solid #444; border-radius: 12px; z-index: 10; padding: 10px; display: flex; align-items: center; gap: 8px; }
        .legend-circle { width: 16px; height: 16px; border: 3px solid red; border-radius: 50%; flex-shrink: 0; }
        .legend-text { font-size: 11px; font-weight: bold; color: #333; line-height: 1.3; }

        .math-panel { width: 880px; margin-top: 15px; padding: 12px; background: #fff; border-radius: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr 1.5fr; gap: 5px; text-align: center; font-weight: bold; }
        .math-highlight { color: #d9534f; font-size: 1.1em; }

        .controls { width: 900px; margin-top: 15px; padding: 15px; background: #e9ecef; border-radius: 10px; display: grid; grid-template-columns: 1.5fr 1fr 1fr 0.8fr; gap: 15px; align-items: end; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: bold; font-size: 0.8em; color: #555; }

        .mode-btn-group { display: flex; gap: 4px; }
        .mode-btn { flex: 1; padding: 7px 0; border: 1px solid #adb5bd; background: #fff; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 0.8em; }
        .mode-btn.active { background: #343a40; color: #fff; border-color: #343a40; }

        button#playPauseBtn { background: #343a40; color: white; cursor: pointer; border: none; font-weight: bold; padding: 10px; border-radius: 5px; transition: 0.2s; }
        button#playPauseBtn:hover { background: #555; }
        .key-hint { font-size: 10px; color: #777; text-align: center; margin-top: 3px; }
    </style>
    <meta property="og:image" content="https://kaneshigenobutsuri.github.io/Interference-of-Light-in-a-Wedge-Shaped-Air-Film/ogp-image.png">
<meta property="og:description" content="くさび型の空気層における光の干渉をモデル化しました。空気の他に、水や高屈折率の物質を挿入できます">
</head>
<body>

<div class="main-container">
    <canvas id="mainCanvas"></canvas>
    <div class="bubble">
        <div class="bubble-label">瞳での合成波</div>
        <canvas id="waveCanvas"></canvas>
        <div id="phaseStatus">計算中...</div>
    </div>
    <div class="legend">
        <div class="legend-circle"></div>
        <div class="legend-text">反射による位相反転<br>(π の位相ズレ)</div>
    </div>
</div>

<canvas id="topCanvas"></canvas>

<div class="math-panel">
    <div>λ₀ = <span class="math-highlight" id="displayWL">---</span> nm</div>
    <div>λ' = <span class="math-highlight" id="displayWLMedium" style="color:#007bff;">---</span> nm</div>
    <div>n = <span class="math-highlight" id="displayN">---</span></div>
    <div>2nd = <span id="display2nd" class="math-highlight">---</span> nm</div>
</div>

<div class="controls">
    <div class="control-group">
        <label>挿入媒質（モード）</label>
        <div class="mode-btn-group">
            <button class="mode-btn" data-mode="air">空気 (1.0)</button>
            <button class="mode-btn active" data-mode="water">水 (1.33)</button>
            <button class="mode-btn" data-mode="high">高屈折 (1.7)</button>
        </div>
    </div>
    <div class="control-group">
        <label>真空中の波長 λ₀ [nm]</label>
        <input type="range" id="waveSlider" min="400" max="750" value="550">
    </div>
    <div class="control-group">
        <label>最大厚 D [nm]</label>
        <input type="range" id="gapSlider" min="500" max="5000" value="2000">
    </div>
    <div class="control-group">
        <button id="playPauseBtn">一時停止</button>
        <div class="key-hint">[Space] キー対応</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const wCanvas = document.getElementById('waveCanvas');
    const wCtx = wCanvas.getContext('2d');
    const tCanvas = document.getElementById('topCanvas');
    const tCtx = tCanvas.getContext('2d');
    const btn = document.getElementById('playPauseBtn');

    const dpr = window.devicePixelRatio || 1;
    function setupCanvas(c, w, h) {
        c.width = w * dpr; c.height = h * dpr;
        c.style.width = w + 'px'; c.style.height = h + 'px';
        const context = c.getContext('2d');
        context.scale(dpr, dpr);
        return context;
    }

    setupCanvas(canvas, 900, 500);
    setupCanvas(tCanvas, 900, 80);
    setupCanvas(wCanvas, 240, 50);

    let currentMode = 'water';
    let eyeX = 450, isDragging = false, isPaused = false, animTime = 0, lastTimestamp = performance.now();
    const startX = 100, glassL_px = 700, bottomBaseY = 420, eyeY = 80, PX_TO_NM = 10;
    const N_GLASS = 1.5;

    document.querySelectorAll('.mode-btn').forEach(button => {
        button.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            button.classList.add('active');
            currentMode = button.dataset.mode;
        });
    });

    const togglePlay = () => { isPaused = !isPaused; btn.innerText = isPaused ? "再生" : "一時停止"; };
    btn.addEventListener('click', togglePlay);
    window.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); togglePlay(); } });

    function getPhysics(x, D, wl, mode) {
        const relativeX = x - startX;
        const d_nm = (relativeX < 0) ? 0 : (relativeX > glassL_px ? D : D * relativeX / glassL_px);
        let n_film = mode === 'water' ? 1.33 : (mode === 'high' ? 1.70 : 1.00);
        const p1_inv = N_GLASS < n_film;
        const p2_inv = n_film < N_GLASS;
        const optPath = 2 * n_film * d_nm;
        const totalPhaseDiff = (2 * Math.PI * optPath / wl) + (p2_inv ? Math.PI : 0) - (p1_inv ? Math.PI : 0);
        return { n: n_film, d_nm, optPath, intensity: Math.pow(Math.cos(totalPhaseDiff/2), 2), amp: Math.cos(totalPhaseDiff/2), p1_inv, p2_inv };
    }

    function drawWave(x, yStart, yEnd, startPhase, time, wl_px, lineWidth, color, opacity, isDownward) {
        ctx.save(); ctx.globalAlpha = opacity; ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = lineWidth;
        const dist = Math.abs(yEnd - yStart);
        for (let i = 0; i <= dist; i += 0.5) {
            const currY = yStart + (isDownward ? i : -i);
            const angle = time - (i / wl_px * 2 * Math.PI) + startPhase;
            const currX = x + Math.sin(angle) * 10;
            if (i === 0) ctx.moveTo(currX, currY); else ctx.lineTo(currX, currY);
        }
        ctx.stroke(); ctx.restore();
        return startPhase - (dist / wl_px * 2 * Math.PI);
    }

    function drawLightSource(x, y, color) {
        ctx.save(); ctx.strokeStyle = "#222"; ctx.lineWidth = 2; ctx.fillStyle = "#444";
        ctx.beginPath(); ctx.moveTo(x-15, y); ctx.lineTo(x+15, y); ctx.lineTo(x+20, y-25); ctx.lineTo(x-20, y-25); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.ellipse(x, y, 15, 5, 0, 0, Math.PI*2); ctx.fillStyle = color; ctx.fill(); ctx.stroke(); ctx.restore();
    }

    function mainLoop(timestamp) {
        const deltaTime = timestamp - lastTimestamp;
        lastTimestamp = timestamp;
        if (!isPaused) animTime += (deltaTime / 150);

        const D = parseInt(document.getElementById('gapSlider').value);
        const wl = parseInt(document.getElementById('waveSlider').value);
        const p = getPhysics(eyeX, D, wl, currentMode);
        const wl_px = wl / PX_TO_NM;
        const hue = 280 - (wl - 400) * 280 / 350;
        const color = `hsl(${hue}, 100%, 50%)`;

        ctx.clearRect(0, 0, 900, 500);
        const botY = bottomBaseY - 30;
        const topY = botY - (p.d_nm / PX_TO_NM);

        // 媒質
        if (currentMode !== 'air') {
            ctx.fillStyle = currentMode === 'water' ? "rgba(180, 220, 255, 0.4)" : "rgba(255, 230, 150, 0.4)";
            ctx.beginPath(); ctx.moveTo(startX, botY); ctx.lineTo(startX+glassL_px, botY); ctx.lineTo(startX+glassL_px, botY-D/PX_TO_NM); ctx.closePath(); ctx.fill();
        }
        // ガラス
        ctx.fillStyle = "rgba(220, 240, 255, 0.3)"; ctx.strokeStyle = "#999";
        ctx.fillRect(startX, botY, glassL_px, 30); ctx.strokeRect(startX, botY, glassL_px, 30);
        ctx.save(); ctx.translate(startX, botY); ctx.rotate(-Math.atan2(D/PX_TO_NM, glassL_px));
        ctx.fillRect(0, -30, glassL_px, 30); ctx.strokeRect(0, -30, glassL_px, 30); ctx.restore();

        // 瞳の描画（再生中は開く、一時停止中は閉じる）
        ctx.save();
        if (isPaused) {
            // 閉じた目
            ctx.beginPath();
            ctx.arc(eyeX, eyeY - 5, 45, 0.2, Math.PI - 0.2, false);
            ctx.strokeStyle = "#444"; ctx.lineWidth = 4; ctx.stroke();
            // まつ毛
            for(let i=0; i<=5; i++){
                const ang = 0.5 + i * (Math.PI - 1)/5;
                ctx.beginPath(); ctx.moveTo(eyeX + Math.cos(ang)*45, eyeY-5 + Math.sin(ang)*45);
                ctx.lineTo(eyeX + Math.cos(ang)*55, eyeY-5 + Math.sin(ang)*55); ctx.stroke();
            }
        } else {
            // 開いた目
            ctx.beginPath(); ctx.ellipse(eyeX, eyeY, 60, 35, 0, 0, Math.PI * 2);
            ctx.fillStyle = "#fff"; ctx.fill(); ctx.strokeStyle = "#444"; ctx.lineWidth = 2; ctx.stroke();
            // 虹彩
            ctx.beginPath(); ctx.arc(eyeX, eyeY, 25, 0, Math.PI * 2);
            ctx.fillStyle = "#4a332d"; ctx.fill();
            // 瞳孔
            ctx.beginPath(); ctx.arc(eyeX, eyeY, 10, 0, Math.PI * 2);
            ctx.fillStyle = "#000"; ctx.fill();
            // ハイライト
            ctx.beginPath(); ctx.arc(eyeX-8, eyeY-8, 5, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255,255,255,0.6)"; ctx.fill();
        }
        ctx.restore();

        // 波とライト
        const incidentStartY = topY - wl_px;
        drawLightSource(eyeX, incidentStartY - 10, color);
        const pA = drawWave(eyeX-15, incidentStartY, topY, 0, animTime, wl_px, 4, color, 0.3, true);
        drawWave(eyeX-15, topY, eyeY+40, pA + (p.p1_inv ? Math.PI : 0), animTime, wl_px, 2.5, color, 1, false);
        const pB = drawWave(eyeX+15, incidentStartY, topY, 0, animTime, wl_px, 4, color, 0.3, true);
        const pC = drawWave(eyeX+15, topY, botY, pB, animTime, (wl/p.n)/PX_TO_NM, 4, color, 0.3, true);
        const pD = drawWave(eyeX+15, botY, topY, pC + (p.p2_inv ? Math.PI : 0), animTime, (wl/p.n)/PX_TO_NM, 2.5, color, 1, false);
        drawWave(eyeX+15, topY, eyeY+40, pD, animTime, wl_px, 2.5, color, 1, false);

        if(p.p1_inv) { ctx.strokeStyle="red"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(eyeX-15, topY, 14, 0, 7); ctx.stroke(); }
        if(p.p2_inv) { ctx.strokeStyle="red"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(eyeX+15, botY, 14, 0, 7); ctx.stroke(); }

        // 合成波
        wCtx.clearRect(0, 0, 240, 50); wCtx.beginPath(); wCtx.strokeStyle = color; wCtx.lineWidth = 4;
        for (let x = 0; x < 240; x++) {
            const val = p.amp * 18 * Math.sin(x / 15 + animTime);
            if (x === 0) wCtx.moveTo(x, 25 + val); else wCtx.lineTo(x, 25 + val);
        }
        wCtx.stroke();

        // --- 究極・超解像干渉縞 (0.2px刻みサンプリング) ---
        tCtx.fillStyle = "#000"; tCtx.fillRect(0, 0, 900, 80);
        for (let x = startX; x < startX + glassL_px; x += 0.2) {
            const lp = getPhysics(x, D, wl, currentMode);
            tCtx.globalAlpha = lp.intensity;
            tCtx.fillStyle = color;
            // 隙間を完璧に埋めるため、描画幅をサンプリング間隔より少し広く(0.3)設定
            tCtx.fillRect(x, 0, 0.3, 80);
        }
        tCtx.globalAlpha = 1;
        if (eyeX >= startX && eyeX < startX + glassL_px) { tCtx.fillStyle = "#fff"; tCtx.fillRect(eyeX - 1, 0, 3, 80); }

        document.getElementById('displayWL').innerText = wl;
        document.getElementById('displayWLMedium').innerText = Math.round(wl / p.n);
        document.getElementById('displayN').innerText = p.n.toFixed(2);
        document.getElementById('display2nd').innerText = Math.round(p.optPath);
        const status = document.getElementById('phaseStatus');
        status.innerText = p.intensity > 0.8 ? "明線 (強め合い)" : (p.intensity < 0.2 ? "暗線 (弱め合い)" : "中間");
        status.style.backgroundColor = `rgba(255,255,0,${p.intensity * 0.4})`;

        requestAnimationFrame(mainLoop);
    }

    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        if (Math.abs((e.clientX - rect.left) - eyeX) < 100) isDragging = true;
    });
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', (e) => {
        if (isDragging) {
            const rect = canvas.getBoundingClientRect();
            eyeX = Math.max(startX, Math.min(startX + glassL_px, e.clientX - rect.left));
        }
    });
    requestAnimationFrame(mainLoop);
</script>
</body>
</html>
